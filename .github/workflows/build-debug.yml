name: Build Debug APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-debug.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Download gradle-wrapper.jar — binary not committed to repo
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Inject secrets into local.properties (never committed to git)
      - name: Generate local.properties
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_HOME
          SENSOR_API_KEY=${{ secrets.SENSOR_API_KEY }}
          CERT_PIN=sha256/debug-placeholder-pin-not-used-in-debug-builds
          EOF

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liberty-shield-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Show APK info
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
          echo "SHA256:   $(sha256sum $APK | cut -d' ' -f1)"
